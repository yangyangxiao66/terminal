name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1). Leave empty to use package.json version."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable package
        run: npm run dist:win

      - name: Resolve version / tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VER=$(node -p "require('./package.json').version")
            TAG="v${VER}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          ls -lh release/*.exe || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-deck-windows-x64
          path: |
            release/terminal-deck-*.exe
            release/latest.yml
          if-no-files-found: error

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: 终端矩阵 ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            release/terminal-deck-*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
